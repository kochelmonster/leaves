<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Leaves Browser Benchmark</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 2em; }
  h1 { color: #569cd6; font-size: 1.4em; }
  #controls { margin: 1em 0; }
  #controls label { margin-right: 1.5em; }
  #controls input { width: 80px; background: #333; color: #d4d4d4; border: 1px solid #555; padding: 4px; font-family: monospace; }
  button { background: #264f78; color: #d4d4d4; border: none; padding: 8px 16px;
           cursor: pointer; font-family: monospace; margin-right: 8px; }
  button:hover { background: #37699e; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #output { white-space: pre; background: #111; padding: 1em; border: 1px solid #333;
            min-height: 400px; max-height: 80vh; overflow: auto; margin-top: 1em; font-size: 14px; }
  .status { color: #569cd6; }
</style>
</head>
<body>
<h1>Leaves _BrowserStore &mdash; Browser Benchmark</h1>

<div id="controls">
  <label>Entries: <input type="number" id="num" value="50000" min="100"></label>
  <label>Value size: <input type="number" id="valsize" value="100" min="1"></label>
  <label>Batch size: <input type="number" id="batchsize" value="1000" min="1"></label>
  <br><br>
  <button onclick="runBench('all')">Run All</button>
  <button onclick="runBench('leaves')">Leaves Only</button>
  <button onclick="runBench('idb')">Raw IDB Only</button>
</div>

<div id="output">Ready. Click a button to start.</div>

<script type="module">
import createModule from '../js/leaves.js';
import { runBrowserBenchmarks } from './db_bench_browser_runner.mjs';

const output = document.getElementById('output');
const allButtons = document.querySelectorAll('button');
let moduleReady = false;
let Module = null;
let diagEnabled = false;

function stamp() {
  return new Date().toISOString();
}

function emit(msg, level = 'log') {
  const line = `[${stamp()}] ${msg}`;
  output.textContent += `${line}\n`;
  output.scrollTop = output.scrollHeight;
  const sink = typeof console[level] === 'function' ? console[level] : console.log;
  sink(line);
}

function log(msg, level = 'log') {
  emit(msg, level);
}

function stderrLevel(text) {
  if (typeof text !== 'string') {
    return 'error';
  }
  if (text.includes('[dbg]') || text.includes('[diag]') || text.includes('[flush]')) {
    return 'warn';
  }
  return 'error';
}

function setButtons(on) {
  allButtons.forEach(button => {
    button.disabled = !on;
  });
}

async function ensureModule() {
  if (Module) {
    return Module;
  }
  log('Loading WASM module...');
  Module = await createModule({
    noInitialRun: true,
    noExitRuntime: true,
    print: text => log(text),
    printErr: text => log(`[stderr] ${text}`, stderrLevel(text)),
  });

  const debugFn = Module?.LeavesStore?.debugEnabled;
  if (typeof debugFn === 'function') {
    diagEnabled = Boolean(debugFn());
  } else {
    // Keep diagnostics on if the runtime is stale and missing the capability probe.
    diagEnabled = true;
    log('WARNING: LeavesStore.debugEnabled() missing; forcing diagnostics on.', 'warn');
  }

  moduleReady = true;
  log(`WASM module loaded. Ready. diagnostics=${diagEnabled ? 'on' : 'off'}\n`);
  setButtons(true);
  return Module;
}

async function runBench(which) {
  if (!moduleReady) {
    await ensureModule();
  }
  setButtons(false);
  output.textContent = '';

  const num = Number(document.getElementById('num').value);
  const valueSize = Number(document.getElementById('valsize').value);
  const batchSize = Number(document.getElementById('batchsize').value);

  const startedAt = performance.now();
  log(`Starting benchmark suite: ${which}`);
  log(`Parameters: num=${num} valueSize=${valueSize} batchSize=${batchSize} diagnostics=${diagEnabled}`);
  log('');

  try {
    await runBrowserBenchmarks(Module, {
      which,
      num,
      valueSize,
      batchSize,
      diagEnabled,
      log,
    });
  } catch (error) {
    log(`ERROR: ${error?.message || error}`, 'error');
    if (error?.stack) {
      log(error.stack, 'error');
    }
  }

  const elapsedMs = Math.round(performance.now() - startedAt);
  log(`Done. elapsedMs=${elapsedMs}`);
  setButtons(true);
}

window.runBench = runBench;
setButtons(false);
output.textContent = '';
ensureModule().catch(error => {
  output.textContent = '';
  log(`Failed to load WASM module: ${error?.message || error}`, 'error');
  if (error?.stack) {
    log(error.stack, 'error');
  }
});
</script>
</body>
</html>
