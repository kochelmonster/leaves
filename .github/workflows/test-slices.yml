name: Test Slices

on:
  push:
  pull_request:

jobs:
  native-tests:
    name: ${{ matrix.slice }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        slice:
          - unit
          - integration
          - stress

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libboost-all-dev

      - name: Configure
        run: cmake --preset ci-tests

      - name: Build
        run: cmake --build --preset ci-tests -j

      - name: Run ${{ matrix.slice }} tests
        run: ctest --preset ci-${{ matrix.slice }}