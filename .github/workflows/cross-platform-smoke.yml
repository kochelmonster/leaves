name: cross-platform-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Toolchain diagnostics (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --version
          ninja --version

      - name: Toolchain diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          ninja --version

      - name: Validate vendored Blake3 path (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ ! -d "BLAKE3/c" ]]; then
            echo "Expected vendored Blake3 at BLAKE3/c but it was not found."
            exit 1
          fi

      - name: Validate vendored Blake3 path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "BLAKE3/c" -PathType Container)) {
            Write-Error "Expected vendored Blake3 at BLAKE3/c but it was not found."
          }

      - name: Install Boost headers (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libboost-dev

      - name: Install Boost headers (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install boost

      - name: Install Boost headers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install boost-msvc-14.3 -y --no-progress
          $boostDir = Get-ChildItem "C:\local" -Filter "boost_*" -Directory |
            Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $boostDir) {
            Write-Error "Could not locate a Boost installation under C:\local after choco install."
            exit 1
          }
          "BOOST_ROOT=$boostDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake -S tests/cross_platform -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S tests/cross_platform -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --parallel 4

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --parallel 4

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --output-on-failure