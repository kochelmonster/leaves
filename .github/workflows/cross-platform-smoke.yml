name: cross-platform-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Toolchain diagnostics (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake --version
          ninja --version

      - name: Toolchain diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --version
          ninja --version

      - name: Validate vendored Blake3 path (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ ! -d "BLAKE3/c" ]]; then
            echo "Expected vendored Blake3 at BLAKE3/c but it was not found."
            exit 1
          fi

      - name: Validate vendored Blake3 path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "BLAKE3/c" -PathType Container)) {
            Write-Error "Expected vendored Blake3 at BLAKE3/c but it was not found."
          }

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake -S tests/cross_platform -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S tests/cross_platform -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: cmake --build build --parallel 4

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --parallel 4

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --output-on-failure