<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebSocket Replication Test</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 2em; }
    #output { white-space: pre-wrap; line-height: 1.5; }
    .pass { color: #4ec9b0; font-weight: bold; }
    .fail { color: #f44747; font-weight: bold; }
    .info { color: #9cdcfe; }
    h1 { color: #dcdcaa; font-size: 1.2em; }
  </style>
</head>
<body>
<h1>Leaves — WebSocket Replication Test</h1>
<div id="output">Loading WASM module...</div>

<script type="module">
import createModule from './leaves.js';
import { LeavesReplicationReceiver } from './leaves_replication.js';

// Get port from URL query string: ?port=19876
const params = new URLSearchParams(location.search);
const PORT = params.get("port") || "19876";

// ── UI logging ────────────────────────────────────────────────
const el = document.getElementById("output");

function log(msg, cls) {
  if (cls) {
    const span = document.createElement("span");
    span.className = cls;
    span.textContent = msg + "\n";
    el.appendChild(span);
  } else {
    el.appendChild(document.createTextNode(msg + "\n"));
  }
}

// ── Test state ────────────────────────────────────────────────
let failures = 0;

function check(cond, msg) {
  if (!cond) {
    log(`  FAIL: ${msg}`, "fail");
    failures++;
  } else {
    log(`  PASS: ${msg}`, "pass");
  }
}

function checkEq(a, b, msg) {
  if (a !== b) {
    log(`  FAIL: ${msg} — got '${a}', expected '${b}'`, "fail");
    failures++;
  } else {
    log(`  PASS: ${msg}`, "pass");
  }
}

// ── Run test ──────────────────────────────────────────────────
async function runTest() {
  el.textContent = "";
  log("=== WebSocket Replication Browser Test ===");
  log("");

  try {
    // 1. Load WASM module
    log("Loading WASM module...", "info");
    const Module = await createModule();
    log("WASM module loaded", "info");
    log("");

    // 2. Create storage
    log("Creating storage...", "info");
    const store = await Module.LeavesStore.create("test_ws_repl", 100 * 1024 * 1024);
    const repldb = await store.openReplication("testdb");
    log("Storage created", "info");
    log("");

    // 3. Connect WebSocket to native server
    const url = "ws://localhost:" + PORT;
    log(`Connecting to ${url}...`, "info");
    const ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";

    await new Promise((resolve, reject) => {
      ws.onopen = resolve;
      ws.onerror = reject;
      setTimeout(() => reject(new Error("WebSocket timeout")), 10000);
    });
    log("Connected", "info");
    log("");

    // 4. Set up message queues
    let textQueue = [];
    let binQueue = [];

    ws.onmessage = (ev) => {
      if (typeof ev.data === "string") {
        textQueue.push(ev.data);
      } else {
        binQueue.push(new Uint8Array(ev.data));
      }
    };

    ws.onclose = () => {};
    ws.onerror = (e) => log("WebSocket error: " + e, "fail");

    // 5. Receive replication data
    log("Receiving replication...", "info");

    const receiver = new LeavesReplicationReceiver(repldb, Module);

    let completed = false;
    let errored = false;

    receiver.begin({ send: data => ws.send(data) }, {
      onComplete: (sid, n) => {
        log(`Replication complete: ${n} nodes`, "info");
        completed = true;
      },
      onError: (sid, err) => {
        log(`Replication error: ${err}`, "fail");
        errored = true;
      }
    });

    while (receiver.state() === "active") {
      const msg = await nextMessage(binQueue, ws);
      if (msg === null) {
        log("WebSocket closed during receive", "fail");
        errored = true;
        break;
      }
      receiver.onMessageReceived(msg);
    }

    if (errored) {
      log("Replication failed", "fail");
    } else {
      log("Replication finished", "info");
      log("");

      // 6. Verify replicated data
      log("Verifying replicated data...", "info");

      const c = repldb.createCursor();

      await c.find("hello");
      check(c.isValid(), "key 'hello' exists");
      if (c.isValid()) checkEq(c.getValue(), "world", "hello → world");

      await c.find("foo");
      check(c.isValid(), "key 'foo' exists");
      if (c.isValid()) checkEq(c.getValue(), "bar", "foo → bar");

      await c.find("count");
      check(c.isValid(), "key 'count' exists");
      if (c.isValid()) checkEq(c.getValue(), "12345", "count → 12345");

      c.delete();
    }

    // 7. Cleanup
    ws.close();
    await store.close();

    log("");
    if (failures === 0) {
      log("=== PASS ===", "pass");
    } else {
      log(`=== FAIL (${failures} check(s) failed) ===`, "fail");
    }

  } catch (e) {
    log("Exception: " + e.message, "fail");
    log("=== FAIL ===", "fail");
  }
}

// ── Message queue helper ──────────────────────────────────────
function nextMessage(queue, ws) {
  if (queue.length > 0) return Promise.resolve(queue.shift());
  return new Promise(resolve => {
    const check = () => {
      if (queue.length > 0) resolve(queue.shift());
      else if (!ws || ws.readyState !== WebSocket.OPEN) resolve(null);
      else setTimeout(check, 10);
    };
    check();
  });
}

// ── Start ─────────────────────────────────────────────────────
runTest();
</script>
</body>
</html>
