<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebSocket Replication Test</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; margin: 2em; }
    #output { white-space: pre-wrap; line-height: 1.5; }
    .pass { color: #4ec9b0; font-weight: bold; }
    .fail { color: #f44747; font-weight: bold; }
    .info { color: #9cdcfe; }
    h1 { color: #dcdcaa; font-size: 1.2em; }
  </style>
</head>
<body>
<h1>Leaves — WebSocket Replication Test</h1>
<div id="output">Loading WASM module...</div>

<script type="module">
console.log("[test.html] module script started (top-level)");

import createModule from './leaves.js';
import { LeavesReplicationReceiver } from './leaves_replication.js';

window.onerror = function(msg, url, line, col, err) {
  console.log("[test.html] WINDOW.ONERROR: " + msg + " at " + url + ":" + line + ":" + col, err);
};

// Get port from URL query string: ?port=19876
const params = new URLSearchParams(location.search);
const PORT = params.get("port") || "19876";

// ── Diagnostic logger with elapsed time ────────────────────────
// NOTE: Must also write to console.log() because DOM updates won't
// render if WASM code blocks the main thread.
const t0 = performance.now();
function dbg(msg) {
  const t = ((performance.now() - t0) / 1000).toFixed(3);
  const line = `[${t}s] ${msg}`;
  console.log(line);
  log(line, "info");
}

// ── UI logging ────────────────────────────────────────────────
const el = document.getElementById("output");

function log(msg, cls) {
  if (cls) {
    const span = document.createElement("span");
    span.className = cls;
    span.textContent = msg + "\n";
    el.appendChild(span);
  } else {
    el.appendChild(document.createTextNode(msg + "\n"));
  }
}

// ── Test state ────────────────────────────────────────────────
let failures = 0;

function check(cond, msg) {
  if (!cond) {
    log(`  FAIL: ${msg}`, "fail");
    failures++;
  } else {
    log(`  PASS: ${msg}`, "pass");
  }
}

function checkEq(a, b, msg) {
  if (a !== b) {
    log(`  FAIL: ${msg} — got '${a}', expected '${b}'`, "fail");
    failures++;
  } else {
    log(`  PASS: ${msg}`, "pass");
  }
}

async function setValuePtrFromString(Module, cursor, value) {
  const bytes = new TextEncoder().encode(value);
  const memory = Module?.LeavesStore;
  if (!memory || typeof memory.allocCopy !== 'function' || typeof memory.free !== 'function') {
    throw new Error("LeavesStore memory API is unavailable (allocCopy/free)");
  }
  const ptr = Number(memory.allocCopy(bytes));
  if (!ptr) {
    throw new Error("Failed to allocate temporary WASM value buffer");
  }
  try {
    await cursor.setValuePtr(ptr, bytes.byteLength);
  } finally {
    memory.free(ptr);
  }
}

// ── Run test ──────────────────────────────────────────────────
async function runTest() {
  el.textContent = "";
  log("=== WebSocket Replication Browser Test ===");
  log("");

  try {
    // ── 1. Load WASM module ──────────────────────────────────────
    dbg("Step 1: Loading WASM module...");
    const Module = await createModule();
    dbg("Step 1b: WASM module loaded");
    log("");

    // ── 2. Delete stale storage, then create fresh ────────────────
    dbg("Step 2: Cleaning old storage...");
    try {
      await Module.LeavesStore.deleteStorage("test_ws_repl");
      dbg("Step 2b: Old storage deleted");
    } catch (e) {
      dbg("Step 2c: No old storage to delete (" + e.message + ")");
    }
    log("done deleting old storage");

    dbg("Step 2d: Creating LeavesStore...");
    const store = await Module.LeavesStore.create("test_ws_repl", 100 * 1024 * 1024);
    dbg("Step 2e: LeavesStore created, typeof store=" + typeof store);

    dbg("Step 2f: Calling store.openReplication('testdb')...");
    const repldb = await store.openReplication("testdb");
    dbg("Step 2g: openReplication returned, typeof repldb=" + typeof repldb);
    log("");

    // ── 3. Connect WebSocket to native server ─────────────────────
    const url = "ws://localhost:" + PORT;
    dbg("Step 3: Connecting WebSocket to " + url + "...");
    const ws = new WebSocket(url);
    ws.binaryType = "arraybuffer";
    dbg("Step 3b: WebSocket object created, readyState=" + ws.readyState);

    // Set up message queues BEFORE awaiting onopen
    let textQueue = [];
    let binQueue = [];

    ws.onmessage = (ev) => {
      const typ = typeof ev.data === "string" ? "text" : "binary";
      dbg("Step 3c: onmessage received (" + typ + "), length=" + (ev.data.length || ev.data.byteLength));
      if (typeof ev.data === "string") {
        textQueue.push(ev.data);
      } else {
        binQueue.push(new Uint8Array(ev.data));
      }
    };

    ws.onclose = () => {
      dbg("Step 3d: WebSocket onclose fired, readyState=" + ws.readyState);
    };
    ws.onerror = (e) => {
      dbg("Step 3e: WebSocket onerror fired, message=" + (e.message || e));
    };

    dbg("Step 3f: Awaiting WebSocket onopen...");
    await new Promise((resolve, reject) => {
      ws.onopen = () => { dbg("Step 3g: WebSocket onopen fired"); resolve(); };
      ws.onerror = (e) => { dbg("Step 3h: WebSocket onerror during connect"); reject(e); };
      setTimeout(() => reject(new Error("WebSocket timeout after 10s")), 10000);
    });
    dbg("Step 3i: WebSocket connected, readyState=" + ws.readyState);
    log("");

    // ── 4. Receive replication data via the FSM ───────────────────
    dbg("Step 4: Creating LeavesReplicationReceiver...");
    const receiver = new LeavesReplicationReceiver(repldb, Module);
    dbg("Step 4b: LeavesReplicationReceiver created");

    let completed = false;
    let errored = false;

    dbg("Step 4c: Calling receiver.begin()...");
    await receiver.begin({ send: data => ws.send(data) }, {
      onComplete: (sid, n) => {
        dbg("Step 4d: onComplete called, sid=" + sid + " nodes=" + n);
        completed = true;
      },
      onError: (sid, err) => {
        dbg("Step 4e: onError called, sid=" + sid + " err=" + err);
        errored = true;
      }
    });
    dbg("Step 4f: receiver.begin() returned, state=" + receiver.state());

    dbg("Step 4g: Entering poll loop...");
    let loopCount = 0;
    while (receiver.state() === "active") {
      loopCount++;
      dbg("Step 4h (iteration " + loopCount + "): state=active, binQueue.length=" + binQueue.length + " textQueue.length=" + textQueue.length + " calling nextMessage()...");
      const msg = await nextMessage(binQueue, ws);
      if (msg === null) {
        dbg("Step 4i: nextMessage returned null (socket closed)");
        errored = true;
        break;
      }
      dbg("Step 4j: nextMessage returned msg of length " + msg.length + ", calling onMessageReceived...");
      await receiver.onMessageReceived(msg);
      dbg("Step 4k: onMessageReceived returned, state=" + receiver.state());
    }

    dbg("Step 4l: Exited poll loop (errored=" + errored + " completed=" + completed + " state=" + receiver.state() + ")");

    if (errored) {
      log("Replication failed", "fail");
    } else {
      dbg("Step 5a: Replication finished, verifying data...");
      log("");

      // ── 5. Verify replicated data ───────────────────────────────
      log("Verifying replicated data...", "info");

      const c = await repldb.createCursor();

      await c.find("hello");
      check(c.isValid(), "key 'hello' exists");
      if (c.isValid()) checkEq(await c.getValue(), "world", "hello → world");

      await c.find("foo");
      check(c.isValid(), "key 'foo' exists");
      if (c.isValid()) checkEq(await c.getValue(), "bar", "foo → bar");

      await c.find("count");
      check(c.isValid(), "key 'count' exists");
      if (c.isValid()) checkEq(await c.getValue(), "12345", "count → 12345");

      await c.find("ptr_smoke");
      await setValuePtrFromString(Module, c, "smoke_ptr");
      await c.commit(false);

      await c.find("ptr_smoke");
      check(c.isValid(), "key 'ptr_smoke' exists");
      if (c.isValid()) checkEq(await c.getValue(), "smoke_ptr", "ptr_smoke → smoke_ptr");

      c.delete();
    }

    // ── 6. Cleanup ───────────────────────────────────────────────
    dbg("Step 6: Cleaning up (closing ws, closing store)...");
    ws.close();
    await store.close();
    dbg("Step 6b: Cleanup done");

    // ── 7. Delete storage ────────────────────────────────────────
    dbg("Step 7: Deleting storage...");
    try {
      await Module.LeavesStore.deleteStorage("test_ws_repl");
      dbg("Step 7b: Storage deleted successfully");
      check(true, "storage deleted");
    } catch (e) {
      dbg("Step 7c: Failed to delete storage: " + e.message);
      check(false, "storage deleted: " + e.message);
    }
    log("");

    log("");
    if (failures === 0) {
      log("=== PASS ===", "pass");
    } else {
      log(`=== FAIL (${failures} check(s) failed) ===`, "fail");
    }

  } catch (e) {
    log("Exception: " + e.message, "fail");
    log("=== FAIL ===", "fail");
  }
}

// ── Message queue helper ──────────────────────────────────────
function nextMessage(queue, ws) {
  if (queue.length > 0) return Promise.resolve(queue.shift());
  return new Promise(resolve => {
    const check = () => {
      if (queue.length > 0) resolve(queue.shift());
      else if (!ws || ws.readyState !== WebSocket.OPEN) resolve(null);
      else setTimeout(check, 10);
    };
    check();
  });
}

console.log("++run test++");
// ── Start ─────────────────────────────────────────────────────
runTest();
</script>
</body>
</html>
